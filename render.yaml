services:
  - type: web
    name: may-an-nhien
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_HTTPS
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://may-an-nhien.onrender.com
      - key: FRONTEND_URL
        value: https://may-an-nhien.onrender.com
      - key: GOOGLE_REDIRECT_URI
        value: https://may-an-nhien.onrender.com/signin.com
      - key: GOOGLE_CLIENT_ID
        value: 834318076523-7q82f9tjvhnqe2pt1vc1hrmkchg32r5g.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
