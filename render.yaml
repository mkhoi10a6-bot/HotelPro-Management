services:
  - type: web
    name: may-an-nhien
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_HTTPS
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: ""
      - key: GOOGLE_API_KEY
        sync: false
